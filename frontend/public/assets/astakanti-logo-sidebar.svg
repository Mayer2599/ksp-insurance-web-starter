    <g transform="translate(565 2)">
      <polygon points="83,0 122,76 83,62 45,128 55,62 0,76" fill="url(#markBlue)"/>
      <polygon points="122,76 184,52 139,98 158,150 92,105" fill="url(#markGreen)"/>
      <polygon points="83,0 92,105 55,62" fill="#2a78b2" opacity=".96"/>
      <polygon points="45,128 92,105 158,150 83,134" fill="#ffffff" opacity=".92"/>
