<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 190" role="img" aria-labelledby="title desc">
  <title id="title">AstaKanti Insurance Broker</title>
  <desc id="desc">High resolution sidebar logo for AstaKanti Insurance Broker.</desc>
  <defs>
    <linearGradient id="markBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#52b7e8"/>
      <stop offset="1" stop-color="#1f5f9f"/>
    </linearGradient>
    <linearGradient id="markGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#badb44"/>
